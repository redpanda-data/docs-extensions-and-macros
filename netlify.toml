[build]
  command = "npx antora --to-dir docs --fetch prod-antora-playbook.yml"
  publish = "docs"

# Environment variables
[build.environment]
  # Node version
  NODE_VERSION = "20"
  # Use custom cache directory for Antora (relative to build directory)
  # This allows Netlify's cache to persist git repos between builds
  ANTORA_CACHE_DIR = ".cache/antora"

# Netlify caching configuration
# The .cache directory is automatically cached by Netlify between builds
# This preserves full git clones, avoiding the need to re-clone on each build
